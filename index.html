<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TX Pro">
<title>TX PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{width:100vw;height:100vh;overflow:hidden;background:linear-gradient(135deg,#0a0e1a,#1a1f3a);font-family:-apple-system,sans-serif}
#popup{position:fixed;top:60px;right:16px;width:240px;z-index:9999;border-radius:20px;background:rgba(10,20,50,0.9);backdrop-filter:blur(20px);border:1px solid rgba(255,215,0,0.3);box-shadow:0 20px 60px rgba(0,0,0,0.6);user-select:none;touch-action:none;max-height:calc(100vh - 140px);overflow-y:auto}
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(135deg,rgba(255,215,0,0.12),rgba(255,215,0,0.05));border-bottom:1px solid rgba(255,215,0,0.2);cursor:grab;border-radius:20px 20px 0 0;position:sticky;top:0;background:rgba(10,20,50,0.95)}
#header:active{cursor:grabbing}
.h-left{font-size:12px;font-weight:900;letter-spacing:2px;color:#ffd700;text-shadow:0 0 15px rgba(255,215,0,0.8)}
.h-right{font-size:9px;font-weight:700;color:rgba(255,215,0,0.8);background:rgba(255,215,0,0.1);padding:3px 8px;border-radius:15px;border:1px solid rgba(255,215,0,0.3)}
#body{padding:14px}
.phien-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:8px 10px;background:rgba(0,0,0,0.3);border-radius:10px;border:1px solid rgba(255,215,0,0.1)}
.phien-label{font-size:8px;color:rgba(255,215,0,0.5);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.phien-num{font-size:11px;color:#ffd700;font-weight:900;letter-spacing:1px}
#status-dot{width:7px;height:7px;border-radius:50%;background:#00ff88;box-shadow:0 0 10px #00ff88;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.dice-row{display:flex;justify-content:center;gap:10px;margin-bottom:14px}
.dice{width:50px;height:50px;background:linear-gradient(135deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));border:1.5px solid rgba(255,215,0,0.3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#ffd700;text-shadow:0 0 15px rgba(255,215,0,0.7)}
.dice.animate{animation:diceShake 0.5s}
@keyframes diceShake{0%{transform:rotate(-8deg) scale(1.1)}25%{transform:rotate(8deg) scale(1.15)}50%{transform:rotate(-6deg)}75%{transform:rotate(4deg)}100%{transform:rotate(0)}}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,0.3),transparent);margin:12px 0}
.ket-qua-box{text-align:center;margin-bottom:12px;padding:10px;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid rgba(255,215,0,0.1)}
.kq-label{font-size:8px;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:700}
#kq-text{font-size:32px;font-weight:900;letter-spacing:2px;transition:all 0.5s}
#kq-text.tai{color:#ff6b35;text-shadow:0 0 25px rgba(255,107,53,0.6)}
#kq-text.xiu{color:#00cfff;text-shadow:0 0 25px rgba(0,207,255,0.6)}
#kq-tong{font-size:10px;color:rgba(255,255,255,0.5);margin-top:4px;font-weight:600}
.du-doan-box{background:linear-gradient(135deg,rgba(0,255,136,0.15),rgba(0,255,136,0.05));border:1.5px solid rgba(0,255,136,0.3);border-radius:14px;padding:12px;display:flex;align-items:center;gap:10px}
.dd-dot{width:12px;height:12px;border-radius:50%;background:#00ff88;box-shadow:0 0 12px #00ff88;flex-shrink:0;animation:dotPulse 2s infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 12px #00ff88}50%{box-shadow:0 0 20px #00ff88}}
.dd-dot.wrong{background:#ff4455;box-shadow:0 0 12px #ff4455}
.dd-info{flex:1}
.dd-sub{font-size:8px;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;font-weight:700}
#dd-text{font-size:18px;font-weight:900;letter-spacing:1px;color:#00ff88;text-shadow:0 0 15px rgba(0,255,136,0.7)}
#dd-text.wrong{color:#ff4455;text-shadow:0 0 15px rgba(255,68,85,0.7)}
#dd-pct{font-size:9px;color:rgba(0,255,136,0.6);margin-top:2px;font-weight:600}
#dd-pct.wrong{color:rgba(255,68,85,0.6)}
.history-row{display:flex;gap:4px;margin-top:12px;flex-wrap:wrap}
.h-chip{font-size:9px;font-weight:800;padding:3px 6px;border-radius:5px;letter-spacing:0.5px}
.h-chip.tai{background:rgba(255,107,53,0.25);color:#ff6b35;border:1px solid rgba(255,107,53,0.4)}
.h-chip.xiu{background:rgba(0,207,255,0.2);color:#00cfff;border:1px solid rgba(0,207,255,0.35)}
.acc-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding:8px;background:rgba(0,0,0,0.3);border-radius:8px;border:1px solid rgba(0,255,136,0.1)}
.acc-label{font-size:8px;color:rgba(255,255,255,0.4);font-weight:700;letter-spacing:1px}
.acc-bar-wrap{flex:1;height:4px;background:rgba(0,0,0,0.5);border-radius:2px;margin:0 8px;overflow:hidden}
.acc-bar{height:100%;background:linear-gradient(90deg,#00ff88,#00cfff);border-radius:2px;transition:width 0.8s}
.acc-pct{font-size:9px;color:#00ff88;font-weight:900}
.streak-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;padding:6px;background:rgba(0,0,0,0.3);border-radius:8px;border:1px solid rgba(255,215,0,0.1)}
.streak-label{font-size:8px;color:rgba(255,255,255,0.4);font-weight:700}
.streak-val{font-size:10px;font-weight:900;color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,0.5)}
.analyzing{text-align:center;padding:8px 0}
.analyzing-text{font-size:11px;color:rgba(255,215,0,0.6);letter-spacing:1px;animation:analyzePulse 1.5s infinite;font-weight:700}
@keyframes analyzePulse{0%,100%{opacity:0.5}50%{opacity:1}}
.shine{animation:shineAnim 0.8s}
@keyframes shineAnim{0%{filter:brightness(1)}50%{filter:brightness(2.5)}100%{filter:brightness(1)}}
.game-btn{position:fixed;bottom:80px;right:20px;background:linear-gradient(135deg,#ff6b35,#ff8c42);color:#fff;border:none;border-radius:50px;padding:14px 22px;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 10px 30px rgba(255,107,53,0.4);z-index:10000;transition:all 0.3s;display:flex;align-items:center;gap:8px}
.game-btn:hover{transform:translateY(-2px);box-shadow:0 15px 40px rgba(255,107,53,0.5)}
.game-btn:active{transform:translateY(0)}
.toggle-btn{position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#ffd700,#ffed4e);color:#0a0e1a;border:none;border-radius:50%;width:50px;height:50px;font-size:24px;cursor:pointer;box-shadow:0 10px 30px rgba(255,215,0,0.4);z-index:10000;transition:all 0.3s;display:flex;align-items:center;justify-content:center}
.toggle-btn:hover{transform:scale(1.1)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:rgba(10,20,50,0.95);backdrop-filter:blur(20px);border:1px solid rgba(255,215,0,0.3);border-radius:12px;padding:12px 20px;color:#ffd700;font-size:11px;font-weight:700;box-shadow:0 10px 30px rgba(0,0,0,0.5);z-index:99999;transition:transform 0.4s}
.toast.show{transform:translateX(-50%) translateY(0)}
.info-banner{position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,#ff6b35,#ff8c42);color:#fff;padding:10px 15px;font-size:11px;font-weight:700;text-align:center;z-index:9999;display:flex;align-items:center;justify-content:center;gap:10px}
.info-banner button{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:5px 12px;border-radius:15px;font-size:10px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="info-banner" id="info-banner">
  <span>🎮 Tap nút CAM để mở game Hitclub</span>
  <button onclick="document.getElementById('info-banner').style.display='none'">✕</button>
</div>
<div id="popup">
  <div id="header">
    <span class="h-left">🎲 TX PRO</span>
    <span class="h-right">LIVE</span>
  </div>
  <div id="body">
    <div class="phien-row">
      <span class="phien-label">PHIÊN</span>
      <span class="phien-num" id="phien-num">---</span>
      <span id="status-dot"></span>
    </div>
    <div class="dice-row">
      <div class="dice" id="d1">?</div>
      <div class="dice" id="d2">?</div>
      <div class="dice" id="d3">?</div>
    </div>
    <div class="divider"></div>
    <div class="ket-qua-box">
      <div class="kq-label">KẾT QUẢ</div>
      <div id="kq-text">---</div>
      <div id="kq-tong">TỔNG: --</div>
    </div>
    <div class="divider"></div>
    <div id="dd-wrap">
      <div class="analyzing"><span class="analyzing-text">⏳ Đang phân tích...</span></div>
    </div>
    <div class="history-row" id="history-row"></div>
    <div class="acc-row" id="acc-row" style="display:none">
      <span class="acc-label">ĐỘ CHÍNH XÁC</span>
      <div class="acc-bar-wrap"><div class="acc-bar" id="acc-bar" style="width:0%"></div></div>
      <span class="acc-pct" id="acc-pct">0%</span>
    </div>
    <div class="streak-row" id="streak-row" style="display:none">
      <span class="streak-label">CHUỖI:</span>
      <span class="streak-val" id="streak-val">0</span>
    </div>
  </div>
</div>
<button class="game-btn" onclick="openGame()">🎮 MỞ GAME</button>
<button class="toggle-btn" onclick="togglePopup()" title="Ẩn/Hiện tool">🎲</button>
<div class="toast" id="toast"></div>
<script>
const API='https://era-technology-particular-domestic.trycloudflare.com/api/tx';
const GAME_URL='https://v.hitclub.mw/?a=hitclub';
let lastPhien=null,history=[],lastPrediction=null,correctCount=0,totalPredictions=0,currentStreak=0,popupVisible=true;
function openGame(){window.open(GAME_URL,'_blank');showToast('🎮 Đã mở game!')}
function togglePopup(){const p=document.getElementById('popup');popupVisible=p.style.display!=='none';p.style.display=popupVisible?'none':'block';showToast(popupVisible?'Đã ẩn tool':'Hiển thị tool')}
(function(){const p=document.getElementById('popup'),h=document.getElementById('header');let drag=false,sx,sy,ox,oy;function pos(){const r=p.getBoundingClientRect();return{x:r.left,y:r.top}}function clamp(v,mi,ma){return Math.max(mi,Math.min(ma,v))}function down(ex,ey){drag=true;const p=pos();ox=p.x;oy=p.y;sx=ex;sy=ey;p.style.transition='none'}function move(ex,ey){if(!drag)return;const dx=ex-sx,dy=ey-sy;const mx=window.innerWidth-p.offsetWidth,my=window.innerHeight-p.offsetHeight;p.style.left=clamp(ox+dx,0,mx)+'px';p.style.top=clamp(oy+dy,0,my)+'px';p.style.right='auto'}function up(){drag=false}h.addEventListener('mousedown',e=>{e.preventDefault();down(e.clientX,e.clientY)});document.addEventListener('mousemove',e=>move(e.clientX,e.clientY));document.addEventListener('mouseup',up);h.addEventListener('touchstart',e=>down(e.touches[0].clientX,e.touches[0].clientY),{passive:true});document.addEventListener('touchmove',e=>{if(drag){e.preventDefault();move(e.touches[0].clientX,e.touches[0].clientY)}},{passive:false});document.addEventListener('touchend',up)})();
function setDice(id,num){const el=document.getElementById(id);el.textContent=(num>=1&&num<=6)?num:'?';el.classList.remove('animate');void el.offsetWidth;el.classList.add('animate');setTimeout(()=>el.classList.remove('animate'),500)}
function predict(hist){if(!hist||hist.length<3)return null;const r=hist.map(h=>h.ket_qua);const t=hist.map(h=>h.tong||0);let s={tai:0,xiu:0};const last=r[0];let st=1;for(let i=1;i<r.length;i++){if(r[i]===last)st++;else break}if(st>=2)s[last==='Tài'?'xiu':'tai']+=2;else s[last==='Tài'?'tai':'xiu']+=1;const l10=r.slice(0,10);const tc=l10.filter(x=>x==='Tài').length;const xc=l10.length-tc;if(tc>xc)s.xiu+=1.5;else if(xc>tc)s.tai+=1.5;else{s.tai+=0.5;s.xiu+=0.5}const avg=t.slice(0,5).reduce((a,b)=>a+b,0)/Math.min(5,t.length);if(avg<10)s.tai+=1;else if(avg>11)s.xiu+=1;const w=s.tai>=s.xiu?'Tài':'Xỉu';const d=Math.abs(s.tai-s.xiu);const c=Math.min(85,Math.max(60,60+d*5+Math.random()*8));return{value:w,pct:Math.round(c)}}
function updateHistory(){const r=document.getElementById('history-row');r.innerHTML='';history.slice(0,14).forEach(h=>{const c=document.createElement('span');c.className='h-chip '+(h.ket_qua==='Tài'?'tai':'xiu');c.textContent=h.ket_qua==='Tài'?'T':'X';r.appendChild(c)})}
function updateAccuracy(){if(totalPredictions<1)return;const p=Math.round(correctCount/totalPredictions*100);document.getElementById('acc-row').style.display='flex';document.getElementById('acc-bar').style.width=p+'%';document.getElementById('acc-pct').textContent=p+'%'}
function updateStreak(){if(totalPredictions<1)return;document.getElementById('streak-row').style.display='flex';document.getElementById('streak-val').textContent=(currentStreak>0?'':'')+' '+Math.abs(currentStreak)}
function renderPrediction(pred,wrong){document.getElementById('dd-wrap').innerHTML='<div class="du-doan-box"><div class="dd-dot '+(wrong?'wrong':'')+'"></div><div class="dd-info"><div class="dd-sub">DỰ ĐOÁN</div><div id="dd-text" class="'+(wrong?'wrong':'')+'">'+pred.value+'</div><div id="dd-pct" class="'+(wrong?'wrong':'')+'">'+pred.pct+'% tin cậy</div></div></div>'}
function showAnalyzing(){document.getElementById('dd-wrap').innerHTML='<div class="analyzing"><span class="analyzing-text"> Đang phân tích...</span></div>'}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function processNew(data){const{kq,phien,tong,x1,x2,x3}={kq:data.ket_qua,phien:data.phien,tong:data.tong||0,x1:data.xuc_xac_1,x2:data.xuc_xac_2,x3:data.xuc_xac_3};let wrong=undefined;if(lastPrediction&&history.length>=1){const ok=lastPrediction.value===kq;totalPredictions++;if(ok){correctCount++;currentStreak=currentStreak>0?currentStreak+1:1;showToast('✅ ĐÚNG!')}else{currentStreak=currentStreak<0?currentStreak-1:-1;showToast('❌ SAI')}wrong=!ok}history.unshift({ket_qua:kq,phien:phien,tong:tong,xuc_xac_1:x1,xuc_xac_2:x2,xuc_xac_3:x3});if(history.length>20)history.pop();document.getElementById('phien-num').textContent='#'+phien;setDice('d1',x1);setDice('d2',x2);setDice('d3',x3);const kqEl=document.getElementById('kq-text');kqEl.textContent=kq;kqEl.className=kq==='Tài'?'tai shine':'xiu shine';setTimeout(()=>kqEl.classList.remove('shine'),800);document.getElementById('kq-tong').textContent='TỔNG: '+(tong||(x1+x2+x3));lastPrediction=predict(history);if(lastPrediction)renderPrediction(lastPrediction,wrong);else showAnalyzing();updateHistory();updateAccuracy();updateStreak()}
async function fetchData(){try{const res=await fetch(API,{cache:'no-store'});if(!res.ok)return;const data=await res.json();if(!data||data.phien==null)return;const phien=Number(data.phien);if(lastPhien===null){lastPhien=phien;document.getElementById('phien-num').textContent='#'+phien;setDice('d1',data.xuc_xac_1);setDice('d2',data.xuc_xac_2);setDice('d3',data.xuc_xac_3);const kqEl=document.getElementById('kq-text');kqEl.textContent=data.ket_qua||'---';kqEl.className=data.ket_qua==='Tài'?'tai':'xiu';document.getElementById('kq-tong').textContent='TỔNG: '+(data.tong||'?');history.unshift({...data,phien});showAnalyzing();return}if(phien!==lastPhien){lastPhien=phien;processNew({...data,phien})}}catch(e){console.log('API error:',e)}}
setTimeout(()=>fetchData(),2000);setInterval(fetchData,150);
</script>
</body>
</html>
